services:
  - type: web
    name: outreach-pro-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: outreach-pro-db
          property: connectionString
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: outreach-pro-db
    databaseName: outreach_pro
    user: outreach_user
    plan: free
